<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Jamia Mahmoodiyya</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="Images/annasr.jpg">
    <style>
        .events-page { padding-top: 100px; }
        .events-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 30px; margin-top: 40px; }
        .event-card { border-radius: 20px; overflow: hidden; transition: all 0.4s ease; border: 1px solid var(--glass-border); position: relative; }
        .event-card:hover { transform: translateY(-10px); box-shadow: var(--shadow-xl); border-color: var(--primary-light); }
        .event-img { width: 100%; height: 220px; object-fit: cover; }
        .event-body { padding: 30px; background: var(--bg-surface); }
        .event-date-tag { position: absolute; top: 20px; left: 20px; background: var(--primary-color); color: white; padding: 8px 15px; border-radius: 10px; font-weight: 700; box-shadow: var(--shadow-md); }
        .event-body h3 { margin-bottom: 15px; font-size: 1.4rem; color: var(--text-heading); }
        .event-meta { display: flex; flex-direction: column; gap: 10px; color: var(--text-muted); font-size: 0.95rem; margin-bottom: 20px; }
        .event-meta span { display: flex; align-items: center; gap: 10px; }
        .event-type-badge { display: inline-block; padding: 5px 12px; background: rgba(4, 120, 87, 0.1); color: var(--primary-color); border-radius: 20px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="splash-screen">
        <img src="Images/annasr-bg.png" alt="Jamia Logo" class="splash-logo">
        <div class="splash-loader"></div>
    </div>

    <header class="main-head glass-header">
        <nav class="navi container">
            <div class="nav-content">
                <div class="nav-img">
                    <a href="index.html"><img src="Images/annasr-bg.png" alt="Jamia Logo"></a>
                </div>
                <div class="nav-link">
                    <ul>
                        <li><a href="index.html" data-i18n="nav-home">Home</a></li>
                        <li><a href="admissions.html" data-i18n="nav-admissions">Admissions</a></li>
                        <li><a href="gallery.html" data-i18n="nav-gallery">Gallery</a></li>
                        <li><a href="events.html" class="active" data-i18n="nav-events">Events</a></li>
                        <li><a href="index.html#contact">Contact</a></li>
                    </ul>
                </div>
                <div class="mobile-menu-btn">
                    <i class="fa-solid fa-bars"></i>
                </div>
            </div>
        </nav>
    </header>

    <main class="events-page">
        <section class="sub-page-hero">
            <div class="container reveal">
                <h1 data-i18n="nav-events">Institutional Events</h1>
                <p>Stay updated with the latest programs, seminars, and spiritual gatherings.</p>
            </div>
        </section>

        <section class="section-padding">
            <div class="container">
                <div class="events-grid" id="events-list">
                    <!-- Events loaded dynamically -->
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="footerContainer container">
            <div class="footerBottom">
                <p>&copy; 2026 Jamia Mahmoodiyya | All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="translations.js" defer></script>
    <script src="script.js" defer></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const list = document.getElementById('events-list');
            fetch('events.json')
                .then(res => res.json())
                .then(data => {
                    list.innerHTML = data.map((event, index) => `
                        <div class="event-card glass-card reveal">
                            <img src="${event.image || 'Images/event-placeholder.jpg'}" alt="${event.title}" class="event-img" onerror="this.src='Images/annasr.jpg'">
                            <div class="event-date-tag">${new Date(event.date).toLocaleDateString('en-US', {day:'numeric', month:'short'})}</div>
                            <div class="event-body">
                                <span class="event-type-badge">${event.type}</span>
                                <h3>${event.title}</h3>
                                <div class="event-meta">
                                    <span><i class="fa-regular fa-clock"></i> ${event.time}</span>
                                    <span><i class="fa-solid fa-location-dot"></i> ${event.location}</span>
                                </div>
                                <p class="event-desc">${event.description || 'Join us for this institutional program.'}</p>
                            </div>
                        </div>
                    `).join('');
                });
        });
    </script>
</body>
</html>
